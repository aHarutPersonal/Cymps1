services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: cmpys
      POSTGRES_PASSWORD: cmpys
      POSTGRES_DB: cmpys
    ports:
      - "5432:5432"
    volumes:
      - cmpys_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  cmpys_pg:
