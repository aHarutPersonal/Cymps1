services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: cmpys
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: cmpys
    volumes:
      - cmpys_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmpys"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - cmpys_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: ${ECR_URL}:${IMAGE_TAG:-latest}
    command: migrate
    environment:
      DATABASE_URL: postgresql+psycopg://cmpys:${POSTGRES_PASSWORD}@postgres:5432/cmpys
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    image: ${ECR_URL}:${IMAGE_TAG:-latest}
    command: web
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://cmpys:${POSTGRES_PASSWORD}@postgres:5432/cmpys
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      LLM_PROVIDER: gemini
      PLAN_GENERATOR_MODE: llm
      LLM_USAGE_TELEMETRY_ENABLED: ${LLM_USAGE_TELEMETRY_ENABLED:-true}
      LLM_BACKGROUND_DAILY_BUDGET_USD: ${LLM_BACKGROUND_DAILY_BUDGET_USD:-0.50}
      LLM_BACKGROUND_BUDGET_SOFT_RATIO: ${LLM_BACKGROUND_BUDGET_SOFT_RATIO:-0.85}
      LLM_BUDGET_INCLUDE_SEARCH_OVERAGE: ${LLM_BUDGET_INCLUDE_SEARCH_OVERAGE:-false}
      ADAPTIVE_ROUTING_ENABLED: ${ADAPTIVE_ROUTING_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    image: ${ECR_URL}:${IMAGE_TAG:-latest}
    command: worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://cmpys:${POSTGRES_PASSWORD}@postgres:5432/cmpys
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      LLM_PROVIDER: gemini
      PLAN_GENERATOR_MODE: llm
      LLM_USAGE_TELEMETRY_ENABLED: ${LLM_USAGE_TELEMETRY_ENABLED:-true}
      LLM_BACKGROUND_DAILY_BUDGET_USD: ${LLM_BACKGROUND_DAILY_BUDGET_USD:-0.50}
      LLM_BACKGROUND_BUDGET_SOFT_RATIO: ${LLM_BACKGROUND_BUDGET_SOFT_RATIO:-0.85}
      LLM_BUDGET_INCLUDE_SEARCH_OVERAGE: ${LLM_BUDGET_INCLUDE_SEARCH_OVERAGE:-false}
      ADAPTIVE_ROUTING_ENABLED: ${ADAPTIVE_ROUTING_ENABLED:-true}
      CATALOG_SCHEDULER_ENABLED: ${CATALOG_SCHEDULER_ENABLED:-true}
      CATALOG_DAILY_JOB_LIMIT: ${CATALOG_DAILY_JOB_LIMIT:-50}
      CATALOG_DISPATCH_PER_TICK: ${CATALOG_DISPATCH_PER_TICK:-2}
      CATALOG_QUOTES_PER_IDOL_LIMIT: ${CATALOG_QUOTES_PER_IDOL_LIMIT:-30}
      CATALOG_QUOTE_MIN_CONFIDENCE: ${CATALOG_QUOTE_MIN_CONFIDENCE:-0.84}
      CATALOG_QUOTE_VERIFICATION_ENABLED: ${CATALOG_QUOTE_VERIFICATION_ENABLED:-true}
      CATALOG_QUOTE_VERIFICATION_BATCH_SIZE: ${CATALOG_QUOTE_VERIFICATION_BATCH_SIZE:-4}
      CATALOG_QUOTE_VERIFICATION_DAILY_LIMIT: ${CATALOG_QUOTE_VERIFICATION_DAILY_LIMIT:-2}
      CATALOG_BOOK_BUDGET_RESERVE_USD: ${CATALOG_BOOK_BUDGET_RESERVE_USD:-0.06}
      CATALOG_IDOL_BUDGET_RESERVE_USD: ${CATALOG_IDOL_BUDGET_RESERVE_USD:-0.12}
      CATALOG_QUOTE_VERIFICATION_BUDGET_RESERVE_USD: ${CATALOG_QUOTE_VERIFICATION_BUDGET_RESERVE_USD:-0.04}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  beat:
    image: ${ECR_URL}:${IMAGE_TAG:-latest}
    command: beat
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://cmpys:${POSTGRES_PASSWORD}@postgres:5432/cmpys
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      LLM_PROVIDER: gemini
      CATALOG_SCHEDULER_ENABLED: ${CATALOG_SCHEDULER_ENABLED:-true}
      CATALOG_DAILY_JOB_LIMIT: ${CATALOG_DAILY_JOB_LIMIT:-50}
      CATALOG_DISPATCH_PER_TICK: ${CATALOG_DISPATCH_PER_TICK:-2}
      CATALOG_QUOTES_PER_IDOL_LIMIT: ${CATALOG_QUOTES_PER_IDOL_LIMIT:-30}
      CATALOG_QUOTE_MIN_CONFIDENCE: ${CATALOG_QUOTE_MIN_CONFIDENCE:-0.84}
      CATALOG_QUOTE_VERIFICATION_ENABLED: ${CATALOG_QUOTE_VERIFICATION_ENABLED:-true}
      CATALOG_QUOTE_VERIFICATION_BATCH_SIZE: ${CATALOG_QUOTE_VERIFICATION_BATCH_SIZE:-4}
      CATALOG_QUOTE_VERIFICATION_DAILY_LIMIT: ${CATALOG_QUOTE_VERIFICATION_DAILY_LIMIT:-2}
      LLM_BACKGROUND_DAILY_BUDGET_USD: ${LLM_BACKGROUND_DAILY_BUDGET_USD:-0.50}
      LLM_BACKGROUND_BUDGET_SOFT_RATIO: ${LLM_BACKGROUND_BUDGET_SOFT_RATIO:-0.85}
      LLM_BUDGET_INCLUDE_SEARCH_OVERAGE: ${LLM_BUDGET_INCLUDE_SEARCH_OVERAGE:-false}
      CATALOG_BOOK_BUDGET_RESERVE_USD: ${CATALOG_BOOK_BUDGET_RESERVE_USD:-0.06}
      CATALOG_IDOL_BUDGET_RESERVE_USD: ${CATALOG_IDOL_BUDGET_RESERVE_USD:-0.12}
      CATALOG_QUOTE_VERIFICATION_BUDGET_RESERVE_USD: ${CATALOG_QUOTE_VERIFICATION_BUDGET_RESERVE_USD:-0.04}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  cmpys_pg:
  cmpys_redis:
