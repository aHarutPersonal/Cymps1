services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: cmpys
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: cmpys
    volumes:
      - cmpys_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmpys"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - cmpys_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: ${ECR_URL}:${IMAGE_TAG:-latest}
    command: migrate
    environment:
      DATABASE_URL: postgresql+psycopg://cmpys:${POSTGRES_PASSWORD}@postgres:5432/cmpys
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    image: ${ECR_URL}:${IMAGE_TAG:-latest}
    command: web
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://cmpys:${POSTGRES_PASSWORD}@postgres:5432/cmpys
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      LLM_PROVIDER: gemini
      PLAN_GENERATOR_MODE: llm
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    image: ${ECR_URL}:${IMAGE_TAG:-latest}
    command: worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://cmpys:${POSTGRES_PASSWORD}@postgres:5432/cmpys
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      LLM_PROVIDER: gemini
      PLAN_GENERATOR_MODE: llm
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  cmpys_pg:
  cmpys_redis:
