services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: cmpys
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: cmpys
    volumes:
      - cmpys_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmpys"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - cmpys_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: ${ECR_URL}:${IMAGE_TAG:-latest}
    command: migrate
    environment:
      DATABASE_URL: postgresql+psycopg://cmpys:${POSTGRES_PASSWORD}@postgres:5432/cmpys
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    image: ${ECR_URL}:${IMAGE_TAG:-latest}
    command: web
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://cmpys:${POSTGRES_PASSWORD}@postgres:5432/cmpys
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      YUNWU_API_KEY: ${YUNWU_API_KEY:-}
      YUNWU_BASE_URL: ${YUNWU_BASE_URL:-https://yunwu.ai/v1}
      YUNWU_FAST_MODEL: ${YUNWU_FAST_MODEL:-gpt-5.6-luna}
      YUNWU_MODEL: ${YUNWU_MODEL:-grok-4.5}
      YUNWU_QUALITY_MODEL: ${YUNWU_QUALITY_MODEL:-claude-fable-5}
      YUNWU_FALLBACK_ENABLED: ${YUNWU_FALLBACK_ENABLED:-true}
      YUNWU_GROUP_RATIO: ${YUNWU_GROUP_RATIO:-6}
      YUNWU_QUOTA_PRICE_CNY: ${YUNWU_QUOTA_PRICE_CNY:-0.5}
      YUNWU_USD_EXCHANGE_RATE: ${YUNWU_USD_EXCHANGE_RATE:-7.3}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      PLAN_GENERATOR_MODE: llm
      LLM_USAGE_TELEMETRY_ENABLED: ${LLM_USAGE_TELEMETRY_ENABLED:-true}
      LLM_BACKGROUND_DAILY_BUDGET_USD: ${LLM_BACKGROUND_DAILY_BUDGET_USD:-0.50}
      LLM_BACKGROUND_BUDGET_SOFT_RATIO: ${LLM_BACKGROUND_BUDGET_SOFT_RATIO:-0.85}
      LLM_BUDGET_INCLUDE_SEARCH_OVERAGE: ${LLM_BUDGET_INCLUDE_SEARCH_OVERAGE:-false}
      ADAPTIVE_ROUTING_ENABLED: ${ADAPTIVE_ROUTING_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    image: ${ECR_URL}:${IMAGE_TAG:-latest}
    command: worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://cmpys:${POSTGRES_PASSWORD}@postgres:5432/cmpys
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      YUNWU_API_KEY: ${YUNWU_API_KEY:-}
      YUNWU_BASE_URL: ${YUNWU_BASE_URL:-https://yunwu.ai/v1}
      YUNWU_FAST_MODEL: ${YUNWU_FAST_MODEL:-gpt-5.6-luna}
      YUNWU_MODEL: ${YUNWU_MODEL:-grok-4.5}
      YUNWU_QUALITY_MODEL: ${YUNWU_QUALITY_MODEL:-claude-fable-5}
      YUNWU_FALLBACK_ENABLED: ${YUNWU_FALLBACK_ENABLED:-true}
      YUNWU_GROUP_RATIO: ${YUNWU_GROUP_RATIO:-6}
      YUNWU_QUOTA_PRICE_CNY: ${YUNWU_QUOTA_PRICE_CNY:-0.5}
      YUNWU_USD_EXCHANGE_RATE: ${YUNWU_USD_EXCHANGE_RATE:-7.3}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      PLAN_GENERATOR_MODE: llm
      LLM_USAGE_TELEMETRY_ENABLED: ${LLM_USAGE_TELEMETRY_ENABLED:-true}
      LLM_BACKGROUND_DAILY_BUDGET_USD: ${LLM_BACKGROUND_DAILY_BUDGET_USD:-0.50}
      LLM_BACKGROUND_BUDGET_SOFT_RATIO: ${LLM_BACKGROUND_BUDGET_SOFT_RATIO:-0.85}
      LLM_BUDGET_INCLUDE_SEARCH_OVERAGE: ${LLM_BUDGET_INCLUDE_SEARCH_OVERAGE:-false}
      ADAPTIVE_ROUTING_ENABLED: ${ADAPTIVE_ROUTING_ENABLED:-true}
      CATALOG_SCHEDULER_ENABLED: ${CATALOG_SCHEDULER_ENABLED:-true}
      CATALOG_DAILY_JOB_LIMIT: ${CATALOG_DAILY_JOB_LIMIT:-50}
      CATALOG_DISPATCH_PER_TICK: ${CATALOG_DISPATCH_PER_TICK:-2}
      CATALOG_QUOTES_PER_IDOL_LIMIT: ${CATALOG_QUOTES_PER_IDOL_LIMIT:-30}
      CATALOG_QUOTE_MIN_CONFIDENCE: ${CATALOG_QUOTE_MIN_CONFIDENCE:-0.84}
      CATALOG_QUOTE_VERIFICATION_ENABLED: ${CATALOG_QUOTE_VERIFICATION_ENABLED:-true}
      CATALOG_QUOTE_VERIFICATION_BATCH_SIZE: ${CATALOG_QUOTE_VERIFICATION_BATCH_SIZE:-4}
      CATALOG_QUOTE_VERIFICATION_DAILY_LIMIT: ${CATALOG_QUOTE_VERIFICATION_DAILY_LIMIT:-2}
      CATALOG_BOOK_BUDGET_RESERVE_USD: ${CATALOG_BOOK_BUDGET_RESERVE_USD:-0.06}
      CATALOG_IDOL_BUDGET_RESERVE_USD: ${CATALOG_IDOL_BUDGET_RESERVE_USD:-0.12}
      CATALOG_QUOTE_VERIFICATION_BUDGET_RESERVE_USD: ${CATALOG_QUOTE_VERIFICATION_BUDGET_RESERVE_USD:-0.04}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # Keep autonomous catalog generation out of the user-facing worker pool.
  # Match the default two-job dispatcher so one long book generation cannot
  # leave the next requested guide sitting behind it in the worker process.
  # The separate control worker keeps Beat ticks and wake-ups responsive.
  catalog-worker:
    image: ${ECR_URL}:${IMAGE_TAG:-latest}
    command: catalog-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://cmpys:${POSTGRES_PASSWORD}@postgres:5432/cmpys
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      YUNWU_API_KEY: ${YUNWU_API_KEY:-}
      YUNWU_BASE_URL: ${YUNWU_BASE_URL:-https://yunwu.ai/v1}
      YUNWU_FAST_MODEL: ${YUNWU_FAST_MODEL:-gpt-5.6-luna}
      YUNWU_MODEL: ${YUNWU_MODEL:-grok-4.5}
      YUNWU_QUALITY_MODEL: ${YUNWU_QUALITY_MODEL:-claude-fable-5}
      YUNWU_FALLBACK_ENABLED: ${YUNWU_FALLBACK_ENABLED:-true}
      YUNWU_GROUP_RATIO: ${YUNWU_GROUP_RATIO:-6}
      YUNWU_QUOTA_PRICE_CNY: ${YUNWU_QUOTA_PRICE_CNY:-0.5}
      YUNWU_USD_EXCHANGE_RATE: ${YUNWU_USD_EXCHANGE_RATE:-7.3}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      LLM_USAGE_TELEMETRY_ENABLED: ${LLM_USAGE_TELEMETRY_ENABLED:-true}
      LLM_BACKGROUND_DAILY_BUDGET_USD: ${LLM_BACKGROUND_DAILY_BUDGET_USD:-0.50}
      LLM_BACKGROUND_BUDGET_SOFT_RATIO: ${LLM_BACKGROUND_BUDGET_SOFT_RATIO:-0.85}
      LLM_BUDGET_INCLUDE_SEARCH_OVERAGE: ${LLM_BUDGET_INCLUDE_SEARCH_OVERAGE:-false}
      ADAPTIVE_ROUTING_ENABLED: ${ADAPTIVE_ROUTING_ENABLED:-true}
      CATALOG_WORKER_CONCURRENCY: ${CATALOG_WORKER_CONCURRENCY:-2}
      CATALOG_SCHEDULER_ENABLED: ${CATALOG_SCHEDULER_ENABLED:-true}
      CATALOG_DAILY_JOB_LIMIT: ${CATALOG_DAILY_JOB_LIMIT:-50}
      CATALOG_DISPATCH_PER_TICK: ${CATALOG_DISPATCH_PER_TICK:-2}
      CATALOG_QUOTES_PER_IDOL_LIMIT: ${CATALOG_QUOTES_PER_IDOL_LIMIT:-30}
      CATALOG_QUOTE_MIN_CONFIDENCE: ${CATALOG_QUOTE_MIN_CONFIDENCE:-0.84}
      CATALOG_QUOTE_VERIFICATION_ENABLED: ${CATALOG_QUOTE_VERIFICATION_ENABLED:-true}
      CATALOG_QUOTE_VERIFICATION_BATCH_SIZE: ${CATALOG_QUOTE_VERIFICATION_BATCH_SIZE:-4}
      CATALOG_QUOTE_VERIFICATION_DAILY_LIMIT: ${CATALOG_QUOTE_VERIFICATION_DAILY_LIMIT:-2}
      CATALOG_BOOK_BUDGET_RESERVE_USD: ${CATALOG_BOOK_BUDGET_RESERVE_USD:-0.06}
      CATALOG_IDOL_BUDGET_RESERVE_USD: ${CATALOG_IDOL_BUDGET_RESERVE_USD:-0.12}
      CATALOG_QUOTE_VERIFICATION_BUDGET_RESERVE_USD: ${CATALOG_QUOTE_VERIFICATION_BUDGET_RESERVE_USD:-0.04}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  catalog-control:
    image: ${ECR_URL}:${IMAGE_TAG:-latest}
    command: catalog-control
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://cmpys:${POSTGRES_PASSWORD}@postgres:5432/cmpys
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      YUNWU_API_KEY: ${YUNWU_API_KEY:-}
      YUNWU_BASE_URL: ${YUNWU_BASE_URL:-https://yunwu.ai/v1}
      YUNWU_FAST_MODEL: ${YUNWU_FAST_MODEL:-gpt-5.6-luna}
      YUNWU_MODEL: ${YUNWU_MODEL:-grok-4.5}
      YUNWU_QUALITY_MODEL: ${YUNWU_QUALITY_MODEL:-claude-fable-5}
      YUNWU_FALLBACK_ENABLED: ${YUNWU_FALLBACK_ENABLED:-true}
      YUNWU_GROUP_RATIO: ${YUNWU_GROUP_RATIO:-6}
      YUNWU_QUOTA_PRICE_CNY: ${YUNWU_QUOTA_PRICE_CNY:-0.5}
      YUNWU_USD_EXCHANGE_RATE: ${YUNWU_USD_EXCHANGE_RATE:-7.3}
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      CATALOG_SCHEDULER_ENABLED: ${CATALOG_SCHEDULER_ENABLED:-true}
      CATALOG_DAILY_JOB_LIMIT: ${CATALOG_DAILY_JOB_LIMIT:-50}
      CATALOG_DISPATCH_PER_TICK: ${CATALOG_DISPATCH_PER_TICK:-2}
      CATALOG_QUOTES_PER_IDOL_LIMIT: ${CATALOG_QUOTES_PER_IDOL_LIMIT:-30}
      CATALOG_QUOTE_MIN_CONFIDENCE: ${CATALOG_QUOTE_MIN_CONFIDENCE:-0.84}
      CATALOG_QUOTE_VERIFICATION_ENABLED: ${CATALOG_QUOTE_VERIFICATION_ENABLED:-true}
      CATALOG_QUOTE_VERIFICATION_BATCH_SIZE: ${CATALOG_QUOTE_VERIFICATION_BATCH_SIZE:-4}
      CATALOG_QUOTE_VERIFICATION_DAILY_LIMIT: ${CATALOG_QUOTE_VERIFICATION_DAILY_LIMIT:-2}
      CATALOG_IDLE_DISCOVERY_ENABLED: ${CATALOG_IDLE_DISCOVERY_ENABLED:-true}
      CATALOG_IDLE_DISCOVERY_INTERVAL_SECONDS: ${CATALOG_IDLE_DISCOVERY_INTERVAL_SECONDS:-900}
      CATALOG_IDLE_DISCOVERY_DAILY_LIMIT: ${CATALOG_IDLE_DISCOVERY_DAILY_LIMIT:-6}
      CATALOG_IDLE_DISCOVERY_RECENT_USER_MINUTES: ${CATALOG_IDLE_DISCOVERY_RECENT_USER_MINUTES:-10}
      CATALOG_IDLE_DISCOVERY_PRIORITY: ${CATALOG_IDLE_DISCOVERY_PRIORITY:-10}
      CATALOG_IDLE_DISCOVERY_INTERACTIVE_QUEUES: ${CATALOG_IDLE_DISCOVERY_INTERACTIVE_QUEUES:-high_priority,default,low_priority}
      LLM_BACKGROUND_DAILY_BUDGET_USD: ${LLM_BACKGROUND_DAILY_BUDGET_USD:-0.50}
      LLM_BACKGROUND_BUDGET_SOFT_RATIO: ${LLM_BACKGROUND_BUDGET_SOFT_RATIO:-0.85}
      LLM_BUDGET_INCLUDE_SEARCH_OVERAGE: ${LLM_BUDGET_INCLUDE_SEARCH_OVERAGE:-false}
      CATALOG_BOOK_BUDGET_RESERVE_USD: ${CATALOG_BOOK_BUDGET_RESERVE_USD:-0.06}
      CATALOG_IDOL_BUDGET_RESERVE_USD: ${CATALOG_IDOL_BUDGET_RESERVE_USD:-0.12}
      CATALOG_QUOTE_VERIFICATION_BUDGET_RESERVE_USD: ${CATALOG_QUOTE_VERIFICATION_BUDGET_RESERVE_USD:-0.04}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  beat:
    image: ${ECR_URL}:${IMAGE_TAG:-latest}
    command: beat
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://cmpys:${POSTGRES_PASSWORD}@postgres:5432/cmpys
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      YUNWU_API_KEY: ${YUNWU_API_KEY:-}
      YUNWU_BASE_URL: ${YUNWU_BASE_URL:-https://yunwu.ai/v1}
      YUNWU_FAST_MODEL: ${YUNWU_FAST_MODEL:-gpt-5.6-luna}
      YUNWU_MODEL: ${YUNWU_MODEL:-grok-4.5}
      YUNWU_QUALITY_MODEL: ${YUNWU_QUALITY_MODEL:-claude-fable-5}
      YUNWU_FALLBACK_ENABLED: ${YUNWU_FALLBACK_ENABLED:-true}
      YUNWU_GROUP_RATIO: ${YUNWU_GROUP_RATIO:-6}
      YUNWU_QUOTA_PRICE_CNY: ${YUNWU_QUOTA_PRICE_CNY:-0.5}
      YUNWU_USD_EXCHANGE_RATE: ${YUNWU_USD_EXCHANGE_RATE:-7.3}
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      CATALOG_SCHEDULER_ENABLED: ${CATALOG_SCHEDULER_ENABLED:-true}
      CATALOG_DAILY_JOB_LIMIT: ${CATALOG_DAILY_JOB_LIMIT:-50}
      CATALOG_DISPATCH_PER_TICK: ${CATALOG_DISPATCH_PER_TICK:-2}
      CATALOG_QUOTES_PER_IDOL_LIMIT: ${CATALOG_QUOTES_PER_IDOL_LIMIT:-30}
      CATALOG_QUOTE_MIN_CONFIDENCE: ${CATALOG_QUOTE_MIN_CONFIDENCE:-0.84}
      CATALOG_QUOTE_VERIFICATION_ENABLED: ${CATALOG_QUOTE_VERIFICATION_ENABLED:-true}
      CATALOG_QUOTE_VERIFICATION_BATCH_SIZE: ${CATALOG_QUOTE_VERIFICATION_BATCH_SIZE:-4}
      CATALOG_QUOTE_VERIFICATION_DAILY_LIMIT: ${CATALOG_QUOTE_VERIFICATION_DAILY_LIMIT:-2}
      CATALOG_IDLE_DISCOVERY_ENABLED: ${CATALOG_IDLE_DISCOVERY_ENABLED:-true}
      CATALOG_IDLE_DISCOVERY_INTERVAL_SECONDS: ${CATALOG_IDLE_DISCOVERY_INTERVAL_SECONDS:-900}
      CATALOG_IDLE_DISCOVERY_DAILY_LIMIT: ${CATALOG_IDLE_DISCOVERY_DAILY_LIMIT:-6}
      CATALOG_IDLE_DISCOVERY_RECENT_USER_MINUTES: ${CATALOG_IDLE_DISCOVERY_RECENT_USER_MINUTES:-10}
      CATALOG_IDLE_DISCOVERY_PRIORITY: ${CATALOG_IDLE_DISCOVERY_PRIORITY:-10}
      CATALOG_IDLE_DISCOVERY_INTERACTIVE_QUEUES: ${CATALOG_IDLE_DISCOVERY_INTERACTIVE_QUEUES:-high_priority,default,low_priority}
      LLM_BACKGROUND_DAILY_BUDGET_USD: ${LLM_BACKGROUND_DAILY_BUDGET_USD:-0.50}
      LLM_BACKGROUND_BUDGET_SOFT_RATIO: ${LLM_BACKGROUND_BUDGET_SOFT_RATIO:-0.85}
      LLM_BUDGET_INCLUDE_SEARCH_OVERAGE: ${LLM_BUDGET_INCLUDE_SEARCH_OVERAGE:-false}
      CATALOG_BOOK_BUDGET_RESERVE_USD: ${CATALOG_BOOK_BUDGET_RESERVE_USD:-0.06}
      CATALOG_IDOL_BUDGET_RESERVE_USD: ${CATALOG_IDOL_BUDGET_RESERVE_USD:-0.12}
      CATALOG_QUOTE_VERIFICATION_BUDGET_RESERVE_USD: ${CATALOG_QUOTE_VERIFICATION_BUDGET_RESERVE_USD:-0.04}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  cmpys_pg:
  cmpys_redis:
