lass="text-xs text-gray-500 font-bold uppercase tracking-widest">or continue with</span><div class="h-[1px] flex-1 bg-white/10"></div></div><!-- /#divider_004 --><!-- #auth-form_005 --><div class="space-y-4"><div class="input-focus border border-white/10 bg-white/5 rounded-xl px-4 py-3 flex flex-col"><label class="text-[10px] uppercase font-bold text-gray-500 mb-1">Email Address</label><input class="bg-transparent text-white outline-none w-full" placeholder="name@example.com" type="email"/></div><div class="input-focus border border-white/10 bg-white/5 rounded-xl px-4 py-3 flex flex-col"><label class="text-[10px] uppercase font-bold text-gray-500 mb-1">Password</label><div class="flex justify-between items-center"><input class="bg-transparent text-white outline-none w-full" placeholder="••••••••" type="password"/><iconify-icon class="text-gray-500" icon="lucide:eye-off"></iconify-icon></div></div></div><!-- /#auth-form_005 --><!-- #forgot-pass_006 --><div class="mt-4 text-right"><button class="text-[var(--cmpys-gold)] text-sm font-medium">Forgot Password?</button></div><!-- /#forgot-pass_006 --></div><!-- /#auth-scroll-area_001 --><!-- #footer_007 --><div class="p-8 bg-[var(--cmpys-charcoal)]"><button class="w-full bg-[var(--cmpys-gold)] text-[var(--cmpys-charcoal)] py-4 rounded-xl font-bold active:scale-95 transition-transform mb-6">                Sign In            </button><p class="text-center text-gray-400 text-sm">                Don't have an account?                 <button class="text-[var(--cmpys-gold)] font-bold">Create one</button></p></div><!-- /#footer_007 --></div></body></html>
