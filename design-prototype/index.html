<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMPYS - Design Prototype (Light)</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="device-frame">
    <div class="notch"></div>
    <div class="screen" id="app"></div>
    <div class="bottom-nav" id="bottomNav">
      <div class="nav-bar-track">
        <button class="nav-item active" data-tab="today" onclick="navigate('today')">
          <svg width="22" height="22" viewBox="0 0 256 256" fill="currentColor"><path d="M152 224h-48a8 8 0 010-16h48a8 8 0 010 16zm72-112v88a16 16 0 01-16 16H48a16 16 0 01-16-16v-88a16 16 0 0116-16h16V56a16 16 0 0116-16h96a16 16 0 0116 16v40h16a16 16 0 0116 16z"/></svg>
          <span>Today</span>
        </button>
        <button class="nav-item" data-tab="plan" onclick="navigate('plan')">
          <svg width="22" height="22" viewBox="0 0 256 256" fill="currentColor"><path d="M224 48H32a8 8 0 00-8 8v144a16 16 0 0016 16h176a16 16 0 0016-16V56a8 8 0 00-8-8zM48 64h160v128H48z"/></svg>
          <span>Plan</span>
        </button>
        <button class="nav-item" data-tab="mentor" onclick="navigate('mentor')">
          <svg width="22" height="22" viewBox="0 0 256 256" fill="currentColor"><path d="M216 48H40a16 16 0 00-16 16v160a16 16 0 0016 16h176a16 16 0 0016-16V64a16 16 0 00-16-16zM96 176a36 36 0 1136-36 36 36 0 01-36 36zm80 0a36 36 0 1136-36 36 36 0 01-36 36z"/></svg>
          <span>Mentor</span>
        </button>
        <button class="nav-item" data-tab="library" onclick="navigate('library')">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
          <span>Library</span>
        </button>
        <button class="nav-item" data-tab="profile" onclick="navigate('profile')">
          <svg width="22" height="22" viewBox="0 0 256 256" fill="currentColor"><path d="M128 24a40 40 0 10-40 40 40 40 0 0040-40zm0 144c-50.81 0-80 26.73-80 48v16h160v-16c0-21.27-29.19-48-80-48z"/></svg>
          <span>Profile</span>
        </button>
      </div>
    </div>
  </div>

  <div class="screen-selector">
    <div class="selector-header">CMPYS <span style="color:var(--text-tertiary);font-weight:500;">Prototype</span></div>
    <div class="selector-subtitle">Light theme + UX improvements</div>
    <div class="screen-grid">
      <button onclick="showScreen('auth')" class="screen-btn"><span>Auth</span></button>
      <button onclick="showScreen('onboarding')" class="screen-btn"><span>Profile Setup</span></button>
      <button onclick="showScreen('idol-search')" class="screen-btn"><span>Idol Search</span></button>
      <button onclick="showScreen('idol-suggest')" class="screen-btn"><span>Idol Suggest</span></button>
      <button onclick="showScreen('idol-confirm')" class="screen-btn"><span>Idol Confirm</span></button>
      <button onclick="showScreen('intake')" class="screen-btn"><span>Agentic Intake</span></button>
      <button onclick="showScreen('interview')" class="screen-btn"><span>Interview</span></button>
      <button onclick="showScreen('results')" class="screen-btn accent"><span>Results</span></button>
      <button onclick="showScreen('today')" class="screen-btn accent"><span>Today</span></button>
      <button onclick="showScreen('comparison')" class="screen-btn"><span>Comparison</span></button>
      <button onclick="showScreen('plan')" class="screen-btn"><span>Plan</span></button>
      <button onclick="showScreen('task-detail')" class="screen-btn"><span>Task Detail</span></button>
      <button onclick="showScreen('mentor')" class="screen-btn"><span>Mentor Chat</span></button>
      <button onclick="showScreen('feed')" class="screen-btn accent"><span>Feed</span></button>
      <button onclick="showScreen('library')" class="screen-btn"><span>Library</span></button>
      <button onclick="showScreen('profile')" class="screen-btn"><span>Profile</span></button>
      <button onclick="showScreen('achievements')" class="screen-btn"><span>Achievements</span></button>
    </div>
  </div>

  <script src="screens.js"></script>
</body>
</html>
